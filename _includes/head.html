<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="{{ page.description | default: site.description }}">
  <meta name="theme-color" content="#7080c0">
  <meta name="robots" content="index, follow">
  <meta name="apple-itunes-app" content="app-id=6755319278">
  <title>{{ page.title | default: site.title }}</title>
  {% seo %}
  {% include seo-home-jsonld.html %}
  <link rel="icon" href="{{ '/assets/images/favicon.ico' | relative_url }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/images/favicon-32x32.png' | relative_url }}">
  <link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <script defer src="{{ '/assets/js/theme.js' | relative_url }}"></script>
  <script defer src="{{ '/assets/js/newsletter.js' | relative_url }}"></script>
  <script defer src="{{ '/assets/js/cookie-consent.js' | relative_url }}"></script>
